<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gethookd Content Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: #0f172a; color: #e2e8f0; line-height: 1.6; 
            min-height: 100vh;
        }
        
        .header { 
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%); 
            padding: 1.5rem 2rem; border-bottom: 1px solid #334155; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .header h1 { color: #60a5fa; font-size: 1.75rem; font-weight: 700; }
        
        .stats { display: flex; gap: 1.5rem; }
        .stat { text-align: center; }
        .stat-num { color: #f59e0b; font-size: 1.5rem; font-weight: 700; }
        .stat-label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; }
        
        .container { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        
        /* CENTERED FILTERS */
        .filters { 
            display: flex; gap: 0.5rem; margin-bottom: 1.5rem; 
            justify-content: center; /* CENTER THE MENU */
            flex-wrap: wrap;
        }
        .filter-btn { 
            padding: 0.75rem 1.5rem; border: 1px solid #334155; border-radius: 8px; 
            background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.9rem; 
            font-weight: 500; transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #475569; }
        .filter-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        
        .post { 
            background: #1e293b; border: 1px solid #334155; border-radius: 12px; 
            padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s;
        }
        .post:hover { border-color: #475569; }
        .post.review { border-left: 4px solid #f59e0b; }
        .post.approved { border-left: 4px solid #059669; }
        .post.scheduled { border-left: 4px solid #a855f7; }
        .post.posted { border-left: 4px solid #60a5fa; opacity: 0.8; }
        
        .post-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem; }
        .post-title { color: #e2e8f0; font-weight: 600; font-size: 1.1rem; flex: 1; }
        .badge { 
            padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem; 
            font-weight: 600; text-transform: uppercase; 
        }
        .badge.review { background: #f59e0b20; color: #f59e0b; }
        .badge.approved { background: #05966920; color: #059669; }
        .badge.scheduled { background: #a855f720; color: #a855f7; }
        .badge.posted { background: #60a5fa20; color: #60a5fa; }
        
        /* MULTIPLE MEDIA SUPPORT */
        .media-container { margin-bottom: 1rem; }
        .media-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 1rem; 
        }
        .media-item { 
            width: 100%; max-height: 300px; object-fit: contain; 
            border-radius: 8px; background: #0f172a; 
            border: 1px solid #334155;
        }
        
        /* VIDEO SPECIFIC STYLING */
        video.media-item {
            background: #000; /* Better background for videos */
        }
        
        video.media-item:hover {
            border-color: #475569;
        }
        
        /* MEDIA LOADING STATES */
        .media-loading {
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            font-size: 0.9rem;
            min-height: 150px;
        }
        
        /* TWITTER THREAD PREVIEW */
        .content-preview-toggle {
            display: flex; gap: 0.5rem; margin-bottom: 1rem;
            justify-content: flex-end; align-items: center;
        }
        .toggle-btn {
            padding: 0.4rem 0.8rem; border: 1px solid #334155; border-radius: 6px;
            background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .toggle-btn:hover { border-color: #475569; }
        .toggle-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        
        .twitter-thread-preview {
            display: flex; flex-direction: column; gap: 1rem;
            background: #0f172a; padding: 1rem; border-radius: 8px;
            border: 1px solid #334155; margin-bottom: 1rem;
        }
        
        .tweet-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            padding: 1rem; position: relative;
        }
        
        .tweet-header {
            display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;
        }
        
        .tweet-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.9rem; color: white;
        }
        
        .tweet-meta {
            display: flex; flex-direction: column;
        }
        
        .tweet-username {
            color: #e2e8f0; font-weight: 600; font-size: 0.9rem;
        }
        
        .tweet-handle {
            color: #64748b; font-size: 0.8rem;
        }
        
        .tweet-content {
            color: #e2e8f0; line-height: 1.4; white-space: pre-wrap;
            font-size: 0.95rem; margin-bottom: 0.5rem;
        }
        
        .tweet-media {
            margin-top: 0.75rem; border-radius: 8px; overflow: hidden;
            border: 1px solid #334155;
        }
        
        .tweet-media .media-item {
            border-radius: 0; border: none;
        }
        
        .tweet-number {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background: #2563eb; color: white; padding: 0.2rem 0.6rem;
            border-radius: 12px; font-size: 0.7rem; font-weight: 600;
        }
        
        .tweet-stats {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #334155;
            font-size: 0.7rem; color: #64748b;
        }
        
        .char-count {
            font-weight: 600;
        }
        
        .char-count.over-limit {
            color: #ef4444;
        }
        
        .thread-connector {
            width: 2px; background: #334155; height: 1rem;
            margin: -0.5rem auto; z-index: 1; position: relative;
        }
        
        .post-content { 
            color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem; 
            white-space: pre-wrap; max-height: 150px; overflow: hidden; 
        }
        
        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn { 
            padding: 0.6rem 1.2rem; border: none; border-radius: 8px; 
            font-weight: 600; cursor: pointer; font-size: 0.85rem; 
            transition: all 0.2s;
        }
        .btn-approve { background: #059669; color: white; }
        .btn-approve:hover { background: #047857; }
        .btn-post-now { background: #2563eb; color: white; }
        .btn-post-now:hover { background: #1d4ed8; }
        .btn-delete { background: #dc2626; color: white; }
        .btn-delete:hover { background: #b91c1c; }

        .type-badge {
            padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.72rem;
            font-weight: 600; background: #0f172a; color: #94a3b8;
            border: 1px solid #334155; margin-right: 0.5rem;
        }
        
        .loading { text-align: center; color: #60a5fa; padding: 3rem; font-size: 1.1rem; }
        .error { text-align: center; color: #ef4444; padding: 2rem; background: #dc262620; border-radius: 8px; }
        .empty { text-align: center; color: #64748b; padding: 3rem; font-size: 1.1rem; }

        /* GETHOOKD ADS BROWSER */
        .gethookd-controls {
            display: flex; gap: 0.75rem; margin-bottom: 1.5rem;
            align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .gethookd-controls select, .gethookd-controls input {
            padding: 0.6rem 1rem; border: 1px solid #334155; border-radius: 8px;
            background: #1e293b; color: #e2e8f0; font-size: 0.9rem;
        }
        .gethookd-controls select:focus, .gethookd-controls input:focus {
            outline: none; border-color: #60a5fa;
        }
        .ad-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s;
            border-left: 4px solid #10b981;
        }
        .ad-card:hover { border-color: #475569; }
        .ad-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem; }
        .ad-brand { color: #10b981; font-weight: 700; font-size: 1rem; }
        .ad-score {
            padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem;
            font-weight: 600; background: #10b98120; color: #10b981;
        }
        .ad-body {
            color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem;
            white-space: pre-wrap; max-height: 200px; overflow-y: auto;
            background: #0f172a; padding: 1rem; border-radius: 8px;
            border: 1px solid #334155;
        }
        .ad-meta {
            display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem;
            font-size: 0.8rem; color: #64748b;
        }
        .ad-meta span { background: #0f172a; padding: 0.2rem 0.6rem; border-radius: 4px; }
        .ad-media-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.5rem; margin-bottom: 1rem;
        }
        .ad-media-grid img, .ad-media-grid video {
            width: 100%; max-height: 200px; object-fit: cover;
            border-radius: 8px; border: 1px solid #334155;
        }
        .ad-analysis {
            display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem;
        }
        .ad-tag {
            padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.72rem;
            font-weight: 600; background: #2563eb20; color: #60a5fa;
            border: 1px solid #2563eb40;
        }
        .btn-import { background: #10b981; color: white; }
        .btn-import:hover { background: #059669; }
        .btn-import:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .pagination {
            display: flex; gap: 0.5rem; justify-content: center; margin-top: 1.5rem;
        }
        .pagination button {
            padding: 0.5rem 1rem; border: 1px solid #334155; border-radius: 8px;
            background: #1e293b; color: #94a3b8; cursor: pointer; font-size: 0.85rem;
        }
        .pagination button:hover { border-color: #60a5fa; color: #60a5fa; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .current-page { background: #2563eb; color: white; border-color: #2563eb; }
        
        .scheduled-info { 
            background: linear-gradient(135deg, #a855f720, #a855f710); 
            border: 1px solid #a855f7; border-radius: 8px; 
            padding: 1rem; margin-bottom: 1rem; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .scheduled-info strong { color: #a855f7; }
        .schedule-time { 
            color: #a855f7; font-weight: 700; font-size: 1.1rem; 
            background: #a855f720; padding: 0.5rem 1rem; border-radius: 6px;
        }
        
        /* BETTER POST CONTENT DISPLAY */
        .post-content { 
            color: #94a3b8; font-size: 0.95rem; margin-bottom: 1rem; 
            white-space: pre-wrap; max-height: 250px; overflow-y: auto; 
            background: #0f172a; padding: 1rem; border-radius: 8px; 
            border: 1px solid #334155;
        }
        
        .content-container {
            margin-bottom: 1rem;
        }
        
        /* IMPROVED ACTIONS */
        .actions { 
            display: flex; gap: 0.75rem; flex-wrap: wrap; 
            padding-top: 0.5rem; border-top: 1px solid #334155; 
        }
        
        /* CLEAN POST HEADER */
        .post-meta { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 0.5rem; 
        }
        .post-meta .badge { margin-left: auto; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🎯 Content Dashboard</h1>
            <p>Super tactical content for @gethookdai</p>
        </div>
        <div class="stats">
            <div class="stat">
                <div class="stat-num" id="stat-review">-</div>
                <div class="stat-label">Review</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-approved">-</div>
                <div class="stat-label">Approved</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-scheduled">-</div>
                <div class="stat-label">Scheduled</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-posted">-</div>
                <div class="stat-label">Posted</div>
            </div>
        </div>
    </div>

    <div class="container">        
        <!-- CENTERED FILTERS -->
        <div class="filters">
            <button class="filter-btn" data-filter="all">All</button>
            <button class="filter-btn active" data-filter="review">📝 Review</button>
            <button class="filter-btn" data-filter="approved">✅ Approved</button>
            <button class="filter-btn" data-filter="scheduled">📅 Scheduled</button>
            <button class="filter-btn" data-filter="posted">🚀 Posted</button>
            <button class="filter-btn" data-filter="gethookd" style="border-color: #10b981; color: #10b981;">🔍 GetHookd Ads</button>
            <button class="filter-btn" onclick="pushToGoogleSheets()" style="border-color: #34a853; color: #34a853; margin-left: 1rem;" id="sheets-btn">📊 Push to Sheets</button>
        </div>
        
        <div id="content">
            <div class="loading">⏳ Loading content...</div>
        </div>
    </div>

    <script>
        let allPosts = [];
        let currentFilter = 'review';
        
        function log(message) {
            // Silent logging for development - only console
            console.log('📊', message);
        }
        
        let gethookdPage = 1;
        let gethookdCollection = 'all';

        function setFilter(filter) {
            log(`Setting filter to: ${filter}`);
            currentFilter = filter;

            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });

            if (filter === 'gethookd') {
                renderGetHookdBrowser();
                return;
            }

            renderContent();
        }
        
        function updateStats() {
            if (!allPosts.length) return;
            
            const stats = {
                review: allPosts.filter(p => p.status === 'review').length,
                approved: allPosts.filter(p => p.status === 'approved' && !p.scheduledAt).length,
                scheduled: allPosts.filter(p => p.status === 'approved' && p.scheduledAt).length,
                posted: allPosts.filter(p => p.status === 'posted').length
            };
            
            Object.entries(stats).forEach(([key, value]) => {
                const el = document.getElementById(`stat-${key}`);
                if (el) el.textContent = value;
            });
            
            log(`Stats: Review=${stats.review}, Approved=${stats.approved}, Scheduled=${stats.scheduled}, Posted=${stats.posted}`);
        }
        
        function renderMediaFiles(post) {
            if (!post.mediaUrl) return '';
            
            // Support multiple media files (comma-separated)
            const mediaUrls = post.mediaUrl.split(',').map(url => url.trim()).filter(url => url);
            
            if (mediaUrls.length === 0) return '';
            
            const mediaHtml = mediaUrls.map(url => {
                // Determine if this is a video based on file extension and/or mediaType
                const isVideo = (post.mediaType && (post.mediaType.includes('video') || post.mediaType === 'video')) || 
                              url.toLowerCase().includes('.mp4') || 
                              url.toLowerCase().includes('.mov') || 
                              url.toLowerCase().includes('.webm');
                
                if (isVideo) {
                    // Determine proper MIME type
                    let mimeType = 'video/mp4'; // default
                    if (url.toLowerCase().includes('.webm')) mimeType = 'video/webm';
                    if (url.toLowerCase().includes('.mov')) mimeType = 'video/quicktime';
                    
                    return `<video class="media-item" controls preload="metadata" 
                            onloadedmetadata="this.style.opacity='1'" 
                            oncanplay="this.style.opacity='1'"
                            onerror="console.error('Video failed to load:', this.src); this.style.backgroundColor='#dc2626'; this.style.opacity='0.5';"
                            style="opacity: 0.7; transition: opacity 0.3s;">
                        <source src="${url}" type="${mimeType}">
                        <source src="${url}">
                        Video cannot be displayed. <a href="${url}" target="_blank" style="color: #60a5fa;">Download video</a>
                    </video>`;
                } else {
                    return `<img class="media-item" src="${url}" alt="${escapeHtml(post.title)}" 
                        onload="this.style.opacity='1'"
                        onerror="console.error('Image failed to load:', this.src); this.style.display='none';"
                        style="opacity: 0.7; transition: opacity 0.3s;">`;
                }
            }).join('');
            
            return `<div class="media-container">
                <div class="media-grid">${mediaHtml}</div>
            </div>`;
        }
        
        function renderContent() {
            const container = document.getElementById('content');
            
            if (!allPosts.length) {
                container.innerHTML = '<div class="loading">⏳ Loading content...</div>';
                return;
            }
            
            let filtered;
            if (currentFilter === 'all') {
                filtered = allPosts;
            } else if (currentFilter === 'scheduled') {
                filtered = allPosts.filter(post => post.status === 'approved' && post.scheduledAt);
            } else {
                filtered = allPosts.filter(post => post.status === currentFilter);
            }
            
            log(`Rendering: ${filtered.length} ${currentFilter} posts (total: ${allPosts.length})`);
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty">No ${currentFilter} posts found</div>`;
                return;
            }
            
            const html = filtered.map(post => {
                const tweets = splitIntoTweets(post.content);
                const isThreaded = tweets.length > 1;
                
                return `
                    <div class="post ${post.status}" data-post-id="${post.id}">
                        <div class="post-meta">
                            <div class="post-title">
                                <span class="type-badge">${getContentType(post)}</span>${escapeHtml(post.title)}
                                ${isThreaded ? `<span style="color: #64748b; font-size: 0.8rem; margin-left: 0.5rem;">(${tweets.length} tweets)</span>` : ''}
                            </div>
                            <span class="badge ${post.status}">${post.status}</span>
                        </div>

                        ${post.scheduledAt ? `
                            <div class="scheduled-info">
                                <div><strong>📅 Scheduled for:</strong></div>
                                <div class="schedule-time">${formatScheduleTime(post.scheduledAt)}</div>
                            </div>
                        ` : ''}

                        <div class="content-preview-toggle">
                            <span style="color: #64748b; font-size: 0.8rem;">Preview:</span>
                            <button class="toggle-btn active" data-view="full" onclick="toggleContentView('${post.id}', 'full')">📄 Full</button>
                            <button class="toggle-btn" data-view="twitter" onclick="toggleContentView('${post.id}', 'twitter')">🐦 Twitter</button>
                        </div>

                        <div class="content-container">
                            <div class="media-section">${!post.mediaUrl ? '' : renderMediaFiles(post)}</div>
                            <div class="post-content">${escapeHtml(post.content)}</div>
                        </div>

                        <div class="actions">
                            ${post.status === 'review' ? `
                                <button class="btn btn-approve" onclick="approvePost('${post.id}')">✅ Approve</button>
                            ` : ''}
                            ${post.status === 'approved' && !post.scheduledAt ? `
                                <button class="btn btn-post-now" onclick="postNow('${post.id}')">🚀 Post Now</button>
                            ` : ''}
                            ${post.status === 'approved' && post.scheduledAt ? `
                                <button class="btn btn-post-now" onclick="postNow('${post.id}')">🚀 Post Now (Override Schedule)</button>
                            ` : ''}
                            <button class="btn btn-delete" onclick="deletePost('${post.id}')">🗑️ Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            container.innerHTML = html;
            updateStats();
        }
        
        function getContentType(post) {
            const title = post.title || '';
            if (/📂/i.test(title)) return '📂 Swipe File';
            if (/Hook\s*Swipe/i.test(title)) return '🪝 Hook Swipe';
            if (/Autopsy/i.test(title)) return '🔬 Ad Autopsy';
            if (/Category/i.test(title)) return '📊 Category War';
            if (/\bvs\b/i.test(title)) return '⚔️ VS Battle';
            return '🏷️ Brand Printing';
        }
        
        function formatScheduleTime(scheduledAt) {
            const date = new Date(scheduledAt);
            const now = new Date();
            
            // Check if it's today
            const isToday = date.toDateString() === now.toDateString();
            
            // Check if it's tomorrow  
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const isTomorrow = date.toDateString() === tomorrow.toDateString();
            
            const timeString = date.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
            
            if (isToday) {
                return `Today at ${timeString}`;
            } else if (isTomorrow) {
                return `Tomorrow at ${timeString}`;
            } else {
                return date.toLocaleDateString('en-US', {
                    weekday: 'short',
                    month: 'short', 
                    day: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });
            }
        }
        
        // Split content into Twitter thread preview (copied from backend logic)
        function splitIntoTweets(text, maxLen = 270) {
            // First split on the "2/2" or "X/X" thread marker
            const sections = text.split(/\n\n(?=\d+\/\d+)/).filter(Boolean);
            const tweets = [];

            for (const section of sections) {
                if (section.length <= maxLen) {
                    tweets.push(section.trim());
                    continue;
                }
                // Split by paragraphs (double newline)
                const paragraphs = section.split('\n\n').filter(Boolean);
                let current = '';
                for (const para of paragraphs) {
                    const candidate = current ? current + '\n\n' + para : para;
                    if (candidate.length <= maxLen) {
                        current = candidate;
                    } else {
                        if (current) tweets.push(current.trim());
                        // If single paragraph exceeds limit, hard split at sentence
                        if (para.length > maxLen) {
                            const sentences = para.match(/[^.!?]+[.!?]+/g) || [para];
                            let chunk = '';
                            for (const s of sentences) {
                                const next = chunk ? chunk + ' ' + s.trim() : s.trim();
                                if (next.length <= maxLen) { chunk = next; }
                                else { if (chunk) tweets.push(chunk.trim()); chunk = s.trim(); }
                            }
                            current = chunk;
                        } else {
                            current = para;
                        }
                    }
                }
                if (current) tweets.push(current.trim());
            }
            return tweets;
        }
        
        function renderTwitterPreview(post) {
            const tweets = splitIntoTweets(post.content);
            
            const tweetCards = tweets.map((tweet, index) => {
                const isFirstTweet = index === 0;
                const tweetNumber = tweets.length > 1 ? `${index + 1}/${tweets.length}` : '';
                const charCount = tweet.length;
                const isOverLimit = charCount > 280;
                
                return `
                    <div class="tweet-card">
                        ${tweetNumber ? `<div class="tweet-number">${tweetNumber}</div>` : ''}
                        <div class="tweet-header">
                            <div class="tweet-avatar">G</div>
                            <div class="tweet-meta">
                                <div class="tweet-username">GetHookd AI</div>
                                <div class="tweet-handle">@gethookdai</div>
                            </div>
                        </div>
                        <div class="tweet-content">${escapeHtml(tweet)}</div>
                        ${isFirstTweet && post.mediaUrl ? `
                            <div class="tweet-media">
                                ${renderMediaFiles(post)}
                            </div>
                        ` : ''}
                        <div class="tweet-stats">
                            <span>Tweet ${index + 1}</span>
                            <span class="char-count ${isOverLimit ? 'over-limit' : ''}">${charCount}/280 chars</span>
                        </div>
                    </div>
                    ${index < tweets.length - 1 ? '<div class="thread-connector"></div>' : ''}
                `;
            }).join('');
            
            return `<div class="twitter-thread-preview">${tweetCards}</div>`;
        }
        
        function toggleContentView(postId, viewType) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            
            const container = document.querySelector(`[data-post-id="${postId}"] .content-container`);
            if (!container) return;
            
            // Update toggle buttons
            const toggles = document.querySelectorAll(`[data-post-id="${postId}"] .toggle-btn`);
            toggles.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === viewType);
            });
            
            // Render content based on view type
            if (viewType === 'twitter') {
                container.innerHTML = renderTwitterPreview(post);
            } else {
                // Full view - media separate from content
                container.innerHTML = `
                    <div class="media-section">${!post.mediaUrl ? '' : renderMediaFiles(post)}</div>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                `;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function validateMediaUrl(url) {
            try {
                const response = await fetch(url, { method: 'HEAD' });
                return response.ok;
            } catch (error) {
                console.error(`Media validation failed for ${url}:`, error);
                return false;
            }
        }
        
        async function loadContent() {
            try {
                log('🔄 Loading content from API...');
                
                const response = await fetch(`/api/content?t=${Date.now()}&cacheBust=${Math.random()}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    throw new Error('API did not return an array');
                }
                
                allPosts = data;
                log(`✅ Loaded ${allPosts.length} posts successfully`);
                
                // Log status breakdown
                const statusCounts = {};
                const mediaIssues = [];
                
                allPosts.forEach(post => {
                    statusCounts[post.status] = (statusCounts[post.status] || 0) + 1;
                    
                    // Check for potential media issues
                    if (post.mediaUrl) {
                        const urls = post.mediaUrl.split(',').map(u => u.trim()).filter(u => u);
                        urls.forEach(url => {
                            // Basic URL validation
                            if (!url.startsWith('/media/') && !url.startsWith('http')) {
                                mediaIssues.push(`${post.id}: Invalid media URL format - ${url}`);
                            }
                        });
                    }
                });
                
                log(`Status breakdown: ${JSON.stringify(statusCounts)}`);
                
                if (mediaIssues.length > 0) {
                    log(`⚠️ Media issues found: ${mediaIssues.length}`);
                    mediaIssues.forEach(issue => log(`🔍 ${issue}`));
                }
                
                renderContent();
                
            } catch (error) {
                log(`❌ ERROR: ${error.message}`);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        ❌ Failed to load content: ${error.message}<br>
                        <button onclick="loadContent()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            🔄 Retry
                        </button>
                    </div>
                `;
            }
        }
        
        async function approvePost(id) {
            try {
                log(`Approving post ${id}...`);
                const response = await fetch(`/api/content/${id}/approve`, { method: 'POST' });
                if (response.ok) {
                    log(`✅ Post ${id} approved`);
                    await loadContent();
                } else {
                    throw new Error(`Approve failed: ${response.status}`);
                }
            } catch (error) {
                log(`❌ Approve error: ${error.message}`);
            }
        }
        
        async function postNow(id) {
            if (!confirm('Post this to Twitter right now?')) return;
            try {
                log(`Posting ${id} to Twitter...`);
                const response = await fetch(`/api/content/${id}/post-now`, { method: 'POST' });
                const data = await response.json();
                if (response.ok) {
                    log(`✅ Posted! Tweet IDs: ${data.tweetIds ? data.tweetIds.join(', ') : 'n/a'}`);
                    await loadContent();
                } else {
                    throw new Error(data.error || `Post failed: ${response.status}`);
                }
            } catch (error) {
                log(`❌ Post Now error: ${error.message}`);
                alert(`Failed to post: ${error.message}`);
            }
        }

        async function deletePost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;
            
            try {
                log(`Deleting post ${id}...`);
                const response = await fetch(`/api/content/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    log(`✅ Post ${id} deleted`);
                    await loadContent();
                } else {
                    throw new Error(`Delete failed: ${response.status}`);
                }
            } catch (error) {
                log(`❌ Delete error: ${error.message}`);
            }
        }
        
        // ── GetHookd Ads Browser ──
        async function renderGetHookdBrowser() {
            const container = document.getElementById('content');
            container.innerHTML = `
                <div class="gethookd-controls">
                    <input id="gethookd-search" type="text" placeholder="Search ads (e.g. supplements, protein...)"
                        style="min-width:220px;" onkeydown="if(event.key==='Enter'){gethookdPage=1;loadGetHookdAds();}">
                    <button class="btn btn-post-now" onclick="gethookdPage=1;loadGetHookdAds();" style="font-size:0.85rem;">Search</button>
                    <select id="gethookd-collection" onchange="gethookdCollection=this.value; gethookdPage=1; loadGetHookdAds();">
                        <option value="all">All Ads (Explore)</option>
                        <option value="high-performers">High Performers (80+)</option>
                        <option value="transformation-hooks">Transformation Hooks</option>
                        <option value="authority-positioning">Authority Positioning</option>
                        <option value="ugc-testimonials">UGC Testimonials</option>
                        <option value="supplement-winners">Supplement Winners</option>
                    </select>
                    <button class="btn btn-import" onclick="refreshSwipeFiles()" style="font-size:0.85rem;">Refresh Swipe Files</button>
                </div>
                <div id="gethookd-ads"><div class="loading">Fetching ads from GetHookd API...</div></div>
            `;
            await loadGetHookdAds();
        }

        async function loadGetHookdAds() {
            const adsContainer = document.getElementById('gethookd-ads');
            if (!adsContainer) return;
            adsContainer.innerHTML = '<div class="loading">Fetching ads from GetHookd API...</div>';

            try {
                let data;
                if (gethookdCollection === 'all') {
                    const searchQuery = document.getElementById('gethookd-search')?.value || '';
                    const queryParam = searchQuery ? `&query=${encodeURIComponent(searchQuery)}` : '';
                    const resp = await fetch(`/api/gethookd/explore?page=${gethookdPage}&per_page=20${queryParam}`);
                    if (!resp.ok) throw new Error(`API returned ${resp.status}`);
                    data = await resp.json();
                    renderGetHookdAds(data.data || [], data);
                } else {
                    const resp = await fetch(`/api/gethookd/collections?pages=2`);
                    if (!resp.ok) throw new Error(`API returned ${resp.status}`);
                    data = await resp.json();
                    const collection = data[gethookdCollection];
                    if (collection) {
                        renderGetHookdAds(collection.ads || [], { collection: gethookdCollection, description: collection.description });
                    } else {
                        adsContainer.innerHTML = '<div class="empty">No ads found in this collection</div>';
                    }
                }
            } catch (error) {
                log(`GetHookd API error: ${error.message}`);
                adsContainer.innerHTML = `<div class="error">Failed to load GetHookd ads: ${error.message}<br>
                    <button onclick="loadGetHookdAds()" style="margin-top:1rem;padding:0.5rem 1rem;background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;">Retry</button>
                </div>`;
            }
        }

        function renderGetHookdAds(ads, meta) {
            const adsContainer = document.getElementById('gethookd-ads');
            if (!ads.length) {
                adsContainer.innerHTML = '<div class="empty">No ads found</div>';
                return;
            }

            const html = ads.map(ad => {
                const analysis = ad.analysis || {};
                const mediaHtml = (ad.media || []).slice(0, 3).map(m => {
                    if (m.type === 'video') {
                        return `<video controls preload="metadata" src="${escapeHtml(m.url)}"></video>`;
                    }
                    return `<img src="${escapeHtml(m.url || m.thumbnail)}" alt="Ad media" onerror="this.style.display='none'">`;
                }).join('');

                const tags = [];
                if (analysis.hook_type) tags.push(analysis.hook_type);
                if (analysis.emotional_trigger && analysis.emotional_trigger !== 'neutral') tags.push(analysis.emotional_trigger);
                if (analysis.social_proof) tags.push('social proof');
                if (analysis.urgency) tags.push('urgency');
                if (analysis.authority) tags.push('authority');

                return `
                    <div class="ad-card">
                        <div class="ad-header">
                            <div class="ad-brand">${escapeHtml(ad.brand?.name || ad.brand || 'Unknown Brand')}${ad.title ? ' - ' + escapeHtml(ad.title) : ''}</div>
                            ${ad.score || ad.performance_score ? `<div class="ad-score">Score: ${ad.score || ad.performance_score}</div>` : ''}
                        </div>
                        <div class="ad-meta">
                            ${ad.cta || ad.cta_type ? `<span>CTA: ${escapeHtml(ad.cta || ad.cta_type)}</span>` : ''}
                            ${ad.days_active ? `<span>${ad.days_active} days active</span>` : ''}
                            ${ad.landing_page ? `<span><a href="${escapeHtml(ad.landing_page)}" target="_blank" style="color:#60a5fa;text-decoration:none;">Landing Page</a></span>` : ''}
                        </div>
                        ${tags.length ? `<div class="ad-analysis">${tags.map(t => `<span class="ad-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                        ${mediaHtml ? `<div class="ad-media-grid">${mediaHtml}</div>` : ''}
                        <div class="ad-body">${escapeHtml(ad.body || 'No copy available')}</div>
                        <div class="actions">
                            <button class="btn btn-import" onclick="importAd(this, ${escapeHtml(JSON.stringify(JSON.stringify(ad)))})">Import to Dashboard</button>
                        </div>
                    </div>
                `;
            }).join('');

            // Pagination for explore mode
            let paginationHtml = '';
            if (gethookdCollection === 'all') {
                paginationHtml = `
                    <div class="pagination">
                        <button ${gethookdPage <= 1 ? 'disabled' : ''} onclick="gethookdPage--; loadGetHookdAds();">Previous</button>
                        <button class="current-page" disabled>Page ${gethookdPage}</button>
                        <button onclick="gethookdPage++; loadGetHookdAds();">Next</button>
                    </div>
                `;
            }

            adsContainer.innerHTML = html + paginationHtml;
        }

        async function importAd(btnEl, adJson) {
            const ad = JSON.parse(adJson);
            btnEl.disabled = true;
            btnEl.textContent = 'Importing...';

            try {
                const resp = await fetch('/api/gethookd/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ad })
                });
                const data = await resp.json();
                if (resp.ok) {
                    btnEl.textContent = data.alreadyImported ? 'Already Imported' : 'Imported!';
                    btnEl.style.background = '#059669';
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                btnEl.textContent = 'Failed';
                btnEl.style.background = '#dc2626';
                log(`Import error: ${error.message}`);
            }
        }

        async function refreshSwipeFiles() {
            try {
                const resp = await fetch('/api/gethookd/refresh-swipe-files', { method: 'POST' });
                const data = await resp.json();
                if (resp.ok) {
                    alert(`Swipe files refreshed! ${data.refreshed.map(c => c.name + ': ' + c.count).join(', ')}`);
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                alert(`Failed to refresh: ${error.message}`);
            }
        }

        // ── Google Sheets ──
        function pushToGoogleSheets() {
            const base = window.location.origin;
            const formula = `=IMPORTDATA("${base}/api/content.csv")`;
            navigator.clipboard.writeText(formula).then(() => {
                const btn = document.getElementById('sheets-btn');
                btn.textContent = '✅ Formula copied!';
                setTimeout(() => { btn.textContent = '📊 Push to Sheets'; }, 3000);
                alert('Formula copied to clipboard!\\n\\nOpen your Google Sheet, click cell A1, and paste (Ctrl+V).\\n\\nYour sheet will auto-sync with the dashboard.');
            }).catch(() => {
                prompt('Copy this formula and paste it into cell A1 of your Google Sheet:', `=IMPORTDATA("${base}/api/content.csv")`);
            });
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => setFilter(btn.dataset.filter));
            });
        });
        
        // Initialize
        log('🚀 Dashboard initializing...');
        loadContent();
        
        // Auto-refresh every 2 minutes
        setInterval(() => {
            log('🔄 Auto-refresh...');
            loadContent();
        }, 120000);
    </script>
