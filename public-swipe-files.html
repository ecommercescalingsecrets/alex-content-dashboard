<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Gethookd Swipe Files</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #ffffff; line-height: 1.6; min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .header { text-align: center; margin-bottom: 40px; padding: 40px 0; }
        .header h1 { font-size: 3rem; color: #ff6b35; margin-bottom: 15px; font-weight: 700; }
        .header p { font-size: 1.3rem; color: #888; margin-bottom: 10px; }
        .header .subtitle { font-size: 1rem; color: #666; }
        .highlight {
            background: linear-gradient(135deg, #ff6b35, #e55a2b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; font-weight: 600;
        }

        /* Source tabs */
        .source-tabs {
            display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .source-tab {
            padding: 0.75rem 1.5rem; border: 1px solid #333; border-radius: 8px;
            background: transparent; color: #888; cursor: pointer; font-size: 0.95rem;
            font-weight: 500; transition: all 0.2s;
        }
        .source-tab:hover { border-color: #ff6b35; color: #ff6b35; }
        .source-tab.active { background: #ff6b35; color: white; border-color: #ff6b35; }

        /* Search bar */
        .search-bar {
            display: flex; gap: 0.75rem; justify-content: center; margin-bottom: 30px;
            flex-wrap: wrap; align-items: center;
        }
        .search-bar input {
            padding: 0.75rem 1.25rem; border: 1px solid #333; border-radius: 8px;
            background: #1a1a1a; color: #fff; font-size: 1rem; min-width: 300px;
        }
        .search-bar input:focus { outline: none; border-color: #ff6b35; }
        .search-bar button {
            padding: 0.75rem 1.5rem; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #ff6b35, #e55a2b); color: white;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .search-bar button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,107,53,0.3); }

        /* Stats bar */
        .stats {
            background: linear-gradient(135deg, #ff6b35, #e55a2b);
            border-radius: 12px; padding: 15px 20px; text-align: center; margin-bottom: 30px;
            font-size: 1.1rem; font-weight: 600;
        }

        /* Collection cards grid */
        .collections-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px; margin-bottom: 40px;
        }
        .collection-card {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 1px solid #333; border-radius: 12px; padding: 25px;
            transition: all 0.3s ease; position: relative; overflow: hidden; cursor: pointer;
        }
        .collection-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #ff6b35, #e55a2b);
            transform: scaleX(0); transition: transform 0.3s ease;
        }
        .collection-card:hover::before { transform: scaleX(1); }
        .collection-card:hover { transform: translateY(-3px); border-color: #ff6b35; box-shadow: 0 10px 30px rgba(255,107,53,0.15); }

        .collection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .collection-title { font-size: 1.3rem; color: #ff6b35; font-weight: 600; }
        .collection-count { background: #ff6b35; color: white; padding: 3px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .collection-description { color: #ccc; margin-bottom: 10px; font-size: 0.95rem; }

        /* Ad cards */
        .ads-grid { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 30px; }
        .ad-card {
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            padding: 1.25rem; transition: border-color 0.2s; border-left: 4px solid #ff6b35;
        }
        .ad-card:hover { border-color: #555; }
        .ad-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem; }
        .ad-brand { color: #ff6b35; font-weight: 700; font-size: 1rem; }
        .ad-score { padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; background: #ff6b3520; color: #ff6b35; }
        .ad-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; font-size: 0.8rem; color: #888; }
        .ad-meta span { background: #222; padding: 0.2rem 0.5rem; border-radius: 4px; }
        .ad-body {
            color: #ccc; font-size: 0.9rem; margin-bottom: 0.75rem;
            white-space: pre-wrap; max-height: 180px; overflow-y: auto;
            background: #111; padding: 0.75rem; border-radius: 8px; border: 1px solid #333;
        }
        .ad-media-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.5rem; margin-bottom: 0.75rem;
        }
        .ad-media-grid img, .ad-media-grid video {
            width: 100%; max-height: 180px; object-fit: cover;
            border-radius: 8px; border: 1px solid #333;
        }
        .ad-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .ad-tag {
            padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.72rem;
            font-weight: 600; background: #ff6b3515; color: #ff6b35; border: 1px solid #ff6b3530;
        }

        /* Pagination */
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin: 1.5rem 0; }
        .pagination button {
            padding: 0.5rem 1rem; border: 1px solid #333; border-radius: 8px;
            background: #1a1a1a; color: #888; cursor: pointer; font-size: 0.85rem;
        }
        .pagination button:hover { border-color: #ff6b35; color: #ff6b35; }
        .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
        .pagination .current-page { background: #ff6b35; color: white; border-color: #ff6b35; }

        .back-btn {
            display: inline-flex; align-items: center; gap: 0.5rem; color: #ff6b35;
            font-size: 0.95rem; cursor: pointer; margin-bottom: 1.5rem; border: none;
            background: none; font-weight: 500;
        }
        .back-btn:hover { text-decoration: underline; }

        .loading { text-align: center; color: #ff6b35; padding: 3rem; font-size: 1.1rem; }
        .error { text-align: center; color: #ef4444; padding: 2rem; background: #dc262620; border-radius: 8px; }
        .empty { text-align: center; color: #666; padding: 3rem; font-size: 1.1rem; }

        .footer { text-align: center; padding: 40px 0; border-top: 1px solid #333; margin-top: 40px; }
        .footer a { color: #ff6b35; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .collections-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
            .search-bar input { min-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Alex's Gethookd Swipe Files</h1>
            <p>Curated collections of <span class="highlight">high-performing ads</span></p>
            <div class="subtitle" id="header-subtitle">Powered by Gethookd API - Live Data</div>
        </div>

        <div class="source-tabs">
            <button class="source-tab active" onclick="switchSource('live')">Live API</button>
            <button class="source-tab" onclick="switchSource('local')">Saved Collections</button>
        </div>

        <div id="search-section" class="search-bar">
            <input id="search-input" type="text" placeholder="Search ads (supplements, protein, skincare...)" onkeydown="if(event.key==='Enter')searchAds();">
            <button onclick="searchAds()">Search</button>
        </div>

        <div id="stats-bar" class="stats" style="display:none;"></div>
        <div id="main-content"><div class="loading">Loading collections...</div></div>

        <div class="footer">
            <p>Powered by <a href="https://gethookd.ai" target="_blank">Gethookd AI</a> |
               Curated by <a href="https://twitter.com/FedotOff90" target="_blank">@FedotOff90</a></p>
        </div>
    </div>

    <script>
        let currentSource = 'live';
        let currentPage = 1;
        let currentQuery = '';

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function switchSource(source) {
            currentSource = source;
            currentPage = 1;
            currentQuery = '';
            document.querySelectorAll('.source-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.source-tab').forEach(t => {
                if ((source === 'live' && t.textContent === 'Live API') ||
                    (source === 'local' && t.textContent === 'Saved Collections'))
                    t.classList.add('active');
            });

            const searchSection = document.getElementById('search-section');
            searchSection.style.display = source === 'live' ? 'flex' : 'none';

            if (source === 'live') {
                loadLiveExplore();
            } else {
                loadLocalCollections();
            }
        }

        // ── LIVE API MODE ──
        async function loadLiveExplore() {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="loading">Fetching ads from GetHookd API...</div>';

            try {
                const queryParam = currentQuery ? `&query=${encodeURIComponent(currentQuery)}` : '';
                const resp = await fetch(`/api/gethookd/explore?page=${currentPage}&per_page=20${queryParam}`);
                if (!resp.ok) throw new Error(`API returned ${resp.status}`);
                const data = await resp.json();

                const ads = data.data || [];
                if (!ads.length) {
                    main.innerHTML = '<div class="empty">No ads found. Try a different search term.</div>';
                    document.getElementById('stats-bar').style.display = 'none';
                    return;
                }

                const statsBar = document.getElementById('stats-bar');
                statsBar.style.display = 'block';
                statsBar.textContent = currentQuery
                    ? `Showing results for "${currentQuery}" — Page ${currentPage}`
                    : `Browsing all ads — Page ${currentPage}`;

                main.innerHTML = renderAdCards(ads) + renderPagination();
            } catch (error) {
                main.innerHTML = `<div class="error">Failed to load from GetHookd API: ${escapeHtml(error.message)}<br>
                    <button onclick="loadLiveExplore()" style="margin-top:1rem;padding:0.5rem 1rem;background:#ff6b35;color:white;border:none;border-radius:8px;cursor:pointer;">Retry</button>
                    <button onclick="switchSource('local')" style="margin-top:1rem;margin-left:0.5rem;padding:0.5rem 1rem;background:#333;color:white;border:none;border-radius:8px;cursor:pointer;">View Saved Collections</button>
                </div>`;
                document.getElementById('stats-bar').style.display = 'none';
            }
        }

        function searchAds() {
            currentQuery = document.getElementById('search-input').value.trim();
            currentPage = 1;
            loadLiveExplore();
        }

        function changePage(delta) {
            currentPage = Math.max(1, currentPage + delta);
            loadLiveExplore();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ── LOCAL COLLECTIONS MODE ──
        async function loadLocalCollections() {
            const main = document.getElementById('main-content');
            document.getElementById('stats-bar').style.display = 'none';
            main.innerHTML = '<div class="loading">Loading saved collections...</div>';

            const collections = [
                { name: 'long-runners', icon: '🏃‍♂️', file: 'long-runners.json' },
                { name: 'elite-performers', icon: '⭐', file: 'elite-performers.json' },
                { name: 'supplement-winners', icon: '💊', file: 'supplement-winners.json' },
                { name: 'authority-positioning', icon: '👨‍⚕️', file: 'authority-positioning.json' },
                { name: 'ugc-testimonials', icon: '📱', file: 'ugc-testimonials.json' },
                { name: 'transformation-hooks', icon: '🔄', file: 'transformation-hooks.json' },
            ];

            let totalAds = 0;
            const cards = [];

            for (const col of collections) {
                try {
                    const resp = await fetch(`/swipe-files/${col.file}`);
                    const data = await resp.json();
                    const count = data.count || data.ads?.length || 0;
                    totalAds += count;
                    cards.push({ ...col, data, count, description: data.description || '' });
                } catch (e) {
                    cards.push({ ...col, data: null, count: 0, description: 'Failed to load' });
                }
            }

            const statsBar = document.getElementById('stats-bar');
            statsBar.style.display = 'block';
            statsBar.textContent = `${totalAds} Total Saved Ads across ${cards.filter(c => c.count > 0).length} Collections`;

            main.innerHTML = `<div class="collections-grid">${cards.map(c => `
                <div class="collection-card" onclick="viewLocalCollection('${c.file}', '${escapeHtml(c.icon)} ${escapeHtml(c.name)}')">
                    <div class="collection-header">
                        <div class="collection-title">${c.icon} ${c.name.replace(/-/g, ' ')}</div>
                        <div class="collection-count">${c.count} ads</div>
                    </div>
                    <div class="collection-description">${escapeHtml(c.description)}</div>
                </div>
            `).join('')}</div>`;
        }

        async function viewLocalCollection(file, label) {
            const main = document.getElementById('main-content');
            main.innerHTML = '<div class="loading">Loading collection...</div>';

            try {
                const resp = await fetch(`/swipe-files/${file}`);
                const data = await resp.json();
                const ads = data.ads || [];

                if (!ads.length) {
                    main.innerHTML = `<button class="back-btn" onclick="loadLocalCollections()">← Back to Collections</button>
                        <div class="empty">This collection is empty. Try refreshing from the Live API.</div>`;
                    return;
                }

                const statsBar = document.getElementById('stats-bar');
                statsBar.textContent = `${label} — ${ads.length} ads (saved ${data.generated ? new Date(data.generated).toLocaleDateString() : 'unknown'})`;

                main.innerHTML = `<button class="back-btn" onclick="loadLocalCollections()">← Back to Collections</button>`
                    + renderAdCards(ads);
            } catch (error) {
                main.innerHTML = `<button class="back-btn" onclick="loadLocalCollections()">← Back to Collections</button>
                    <div class="error">Failed to load: ${escapeHtml(error.message)}</div>`;
            }
        }

        // ── SHARED RENDERERS ──
        function renderAdCards(ads) {
            return `<div class="ads-grid">${ads.map(ad => {
                const brand = ad.brand?.name || ad.brand || 'Unknown';
                const score = ad.score || ad.performance_score;
                const days = ad.days_active;
                const cta = ad.cta || ad.cta_type;
                const landing = ad.landing_page;
                const analysis = ad.analysis || {};

                const tags = [];
                if (analysis.hook_type) tags.push(analysis.hook_type);
                if (analysis.emotional_trigger && analysis.emotional_trigger !== 'neutral') tags.push(analysis.emotional_trigger);
                if (analysis.performance_tier) tags.push(analysis.performance_tier);
                if (analysis.social_proof || analysis.has_social_proof) tags.push('social proof');
                if (analysis.urgency) tags.push('urgency');
                if (analysis.authority || analysis.has_authority) tags.push('authority');
                if (analysis.has_transformation) tags.push('transformation');
                if (analysis.is_ugc_style) tags.push('UGC');

                const mediaHtml = (ad.media || []).slice(0, 3).map(m => {
                    const url = m.url || m.thumbnail_url || '';
                    if (m.type === 'video' && m.thumbnail_url) {
                        return `<img src="${escapeHtml(m.thumbnail_url)}" alt="Video thumbnail" onerror="this.style.display='none'">`;
                    }
                    return `<img src="${escapeHtml(url)}" alt="Ad media" onerror="this.style.display='none'">`;
                }).join('');

                return `<div class="ad-card">
                    <div class="ad-header">
                        <div class="ad-brand">${escapeHtml(brand)}${ad.title ? ' — ' + escapeHtml(ad.title) : ''}</div>
                        ${score ? `<div class="ad-score">Score: ${score}</div>` : ''}
                    </div>
                    <div class="ad-meta">
                        ${cta ? `<span>CTA: ${escapeHtml(cta)}</span>` : ''}
                        ${days ? `<span>${days} days active</span>` : ''}
                        ${landing ? `<span><a href="${escapeHtml(landing)}" target="_blank" style="color:#ff6b35;text-decoration:none;">Landing Page</a></span>` : ''}
                    </div>
                    ${tags.length ? `<div class="ad-tags">${tags.map(t => `<span class="ad-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
                    ${mediaHtml ? `<div class="ad-media-grid">${mediaHtml}</div>` : ''}
                    <div class="ad-body">${escapeHtml(ad.body || 'No copy available')}</div>
                </div>`;
            }).join('')}</div>`;
        }

        function renderPagination() {
            return `<div class="pagination">
                <button ${currentPage <= 1 ? 'disabled' : ''} onclick="changePage(-1)">← Previous</button>
                <button class="current-page" disabled>Page ${currentPage}</button>
                <button onclick="changePage(1)">Next →</button>
            </div>`;
        }

        // ── INIT ──
        loadLiveExplore();
    </script>
</body>
</html>
